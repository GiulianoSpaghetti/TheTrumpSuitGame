name: .NET MAUI Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Release]

    env:
      Solution_Name: TrumpSuitGame.slnx
      Configuration: ${{ matrix.configuration }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Install MAUI Workload
      run: dotnet workload install maui

    - name: Restore packages
      run: dotnet restore TrumpSuitGame.slnx

    - name: Create PFX certificate
      run: |
        $password = ConvertTo-SecureString -String "Giu3li2@1" -AsPlainText -Force
        $cert = New-SelfSignedCertificate -Type CodeSigningCert -DnsName "TheTrumpSuitGame" -FriendlyName "Trump Suite Game Dev" -NotAfter (Get-Date).AddYears(10)
        Export-PfxCertificate -Cert $cert -FilePath "${{ github.workspace }}/TrumpSuitGame/signing.pfx" -Password $password
      shell: pwsh

    - name: Build MAUI MSIX
      run: |
        $password = ConvertTo-SecureString -String "Giu3li2@1" -AsPlainText -Force
        dotnet publish TrumpSuitGame/TrumpSuitGame.csproj `
          -f net10.0-windows10.0.26100.0 `
          -c $env:Configuration `
          -p:AppxPackageSigningEnabled=true `
          -p:PackageCertificateKeyFile="${{ github.workspace }}/TrumpSuitGame/signing.pfx" `
          -p:PackageCertificatePassword=$password
      shell: pwsh

    - name: Clean up certificate
      run: Remove-Item -Path "TrumpSuitGame/signing.pfx" -Force
      shell: pwsh

    - name: Upload MSIX artifact
      uses: actions/upload-artifact@v4
      with:
        name: MSIX
        path: TrumpSuitGame/bin/Release/net10.0-windows10.0.26100.0/win10-x64/AppPackages
        include-hidden-files: true
        if-no-files-found: error
